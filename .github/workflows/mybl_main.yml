name: Robi Daily Point Claim

on:
  schedule:
    # বাংলাদেশ সময় সকাল ৬:১০ (UTC সময় রাত 00:10)
    - cron: '19 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  claim-points:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Script
        run: python robi_claim.py

      - name: Commit and push updated tokens
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add tokens.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-updated access token" && git push)
